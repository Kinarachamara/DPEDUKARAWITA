<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Animated Transparent GIF Overlays</title>
  <style>
    body {
      margin: 0;
      background-color: black;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      color: white;
      font-family: 'Noto Sans Sinhala', sans-serif;
    }

    .title {
      font-size: 48px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 1;
      transition: opacity 1.5s ease-in-out;
      z-index: 9999;
    }

    .title img {
      width: 50px;
      height: auto;
      margin-right: 10px;
      margin-left: 10px;
    }

    #container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      max-width: 90vw;
      max-height: 90vh;
      overflow: hidden;
    }

    #background {
      display: block;
      width: 100%;
      height: auto;
    }

    .overlay-gif {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: auto;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
    }

    #backgroundAudio {
      display: none;
    }

    #playButton {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: transparent;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      z-index: 9999;
    }
  </style>
</head>
<body>

  <!-- Title -->
  <h2 id="title" class="title">
    <img src="lo.png" alt="Emoji">
    සදකිදුරු ජාතකය
    <img src="lo.png" alt="Emoji">
  </h2>

  <!-- Container -->
  <div id="container">
    <img id="background" src="https://lh3.googleusercontent.com/pw/AP1GczPl9g2PqBWElguWyxgid-9d2N4k88TJEfG5jzIbQ-I5PwYJi5Uu0V-QmAJGm8JNFmgJVQEbTEk2Fq5VxP86CCBeBknp1ZkXceSc6Efh9zr_2tcPDG49LdgQEMwxTATx9LoIVKVfIQRLjZfahkBH1rUF=w773-h773-s-no-gm" alt="Background">

    <!-- Overlays -->
    <img class="overlay-gif" src="https://lh3.googleusercontent.com/pw/AP1GczOfd3mDctphTE8n01FYC89GO73_j-FaUI-2Puw91oweaa-JOvcpYj2plhh_rcjJx8d2ZE9BC331znD_Y6lUdGOJm4ypJXqwi0WXWpaHDiHMdBte1EdT59HkKsN3DiWtVjwstHoF6scnEOVs7atIiqQo=w773-h773-s-no-gm" alt="1 peththa">
    <img class="overlay-gif" src="1.png" alt="1 peththa"> 
    <img class="overlay-gif" src="2.png" alt="1 peththa"> 
    <img class="overlay-gif" src="3.png" alt="1 peththa">    
    <img class="overlay-gif" src="4.png" alt="1 peththa"> 
    <img class="overlay-gif" src="5.png" alt="1 peththa"> 
    <img class="overlay-gif" src="6.png" alt="1 peththa">
    <img class="overlay-gif" src="7.png" alt="1 peththa"> 
    <img class="overlay-gif" src="8.png" alt="1 peththa"> 
    <img class="overlay-gif" src="10.png" alt="1 peththa">    
    <img class="overlay-gif" src="https://lh3.googleusercontent.com/pw/AP1GczM3ViQH9zs9T8pYsqecZfleWXoQT84USRq4X7KJLdvcaIBuMkLborjJ5PFD-IkeF91zomMPKZ3nk6zghO2Vxppfhs0nWRm2NUWd-M60yQiuuPn3LwlZ3TmEFvhqcclm2KKNASKEWRrbcHeQsNuHARc8=w773-h773-s-no-gm" alt="final">
  </div>

  <!-- Audio Element -->
  <audio id="backgroundAudio" autoplay loop>
    <source src="audio.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <script>
    const audio = document.getElementById("backgroundAudio");

    // Page load වෙනවා සමග audio play කිරීමට උත්සාහ කිරීම
    window.addEventListener('load', () => {
      // 1 second delay දාලා title fade කරනවා (ඔබේ original logic එකට අනුව)
      setTimeout(() => {
        document.getElementById("title").style.opacity = "0";

        setTimeout(() => {
          document.getElementById("title").style.display = "none";

          const overlays = document.querySelectorAll('.overlay-gif');
          overlays.forEach(overlay => {
            overlay.style.opacity = '1';
          });

          // Title ආපහු ගන්න
          setTimeout(() => {
            document.getElementById("title").style.display = "flex";
            document.getElementById("title").style.opacity = "1";
            document.getElementById("title").style.position = "relative";
            document.getElementById("title").style.top = "10px";
            document.getElementById("title").style.left = "auto";
            document.getElementById("title").style.transform = "none";
          }, 1000);

          // Audio එකට force play (browser restrictions නිසා සමහර විට අවශ්‍ය වෙනවා)
          audio.play().catch(err => {
            console.log("Autoplay prevented by browser. User interaction needed.");
          });

        }, 1500);
      }, 1000);
    });
  </script>

</body>
</html>
