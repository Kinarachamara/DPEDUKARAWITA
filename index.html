<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>සදකිදුරු ජාතකය</title>
  <style>
    body {
      margin: 0;
      background-color: black;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      color: white;
      font-family: 'Noto Sans Sinhala', sans-serif;
    }

    .title {
      font-size: 48px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 1;
      transition: opacity 1.5s ease-in-out;
      z-index: 9999;
    }

    .title img {
      width: 50px;
      height: auto;
      margin: 0 10px;
    }

    #container {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      overflow: hidden;
    }

    .overlay-gif {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: auto;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
    }

    #playButton {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.7);
      color: white;
      border: 2px solid white;
      padding: 15px 30px;
      font-size: 22px;
      border-radius: 50px;
      cursor: pointer;
      z-index: 10000;
      display: none; /* initially hidden */
    }

    #playButton:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>

  <h2 id="title" class="title">
    <img src="lo.png" alt="Emoji">
    සදකිදුරු ජාතකය
    <img src="lo.png" alt="Emoji">
  </h2>

  <div id="container">
    <img id="background" src="https://lh3.googleusercontent.com/pw/AP1GczPl9g2PqBWElguWyxgid-9d2N4k88TJEfG5jzIbQ-I5PwYJi5Uu0V-QmAJGm8JNFmgJVQEbTEk2Fq5VxP86CCBeBknp1ZkXceSc6Efh9zr_2tcPDG49LdgQEMwxTATx9LoIVKVfIQRLjZfahkBH1rUF=w773-h773-s-no-gm" alt="Background">

    <!-- Overlays -->
    <img class="overlay-gif" src="https://lh3.googleusercontent.com/pw/AP1GczOfd3mDctphTE8n01FYC89GO73_j-FaUI-2Puw91oweaa-JOvcpYj2plhh_rcjJx8d2ZE9BC331znD_Y6lUdGOJm4ypJXqwi0WXWpaHDiHMdBte1EdT59HkKsN3DiWtVjwstHoF6scnEOVs7atIiqQo=w773-h773-s-no-gm" alt="1">
    <img class="overlay-gif" src="1.png" alt="1"> 
    <img class="overlay-gif" src="2.png" alt="2"> 
    <img class="overlay-gif" src="3.png" alt="3">    
    <img class="overlay-gif" src="4.png" alt="4"> 
    <img class="overlay-gif" src="5.png" alt="5"> 
    <img class="overlay-gif" src="6.png" alt="6">
    <img class="overlay-gif" src="7.png" alt="7"> 
    <img class="overlay-gif" src="8.png" alt="8"> 
    <img class="overlay-gif" src="10.png" alt="10">    
    <img class="overlay-gif" src="https://lh3.googleusercontent.com/pw/AP1GczM3ViQH9zs9T8pYsqecZfleWXoQT84USRq4X7KJLdvcaIBuMkLborjJ5PFD-IkeF91zomMPKZ3nk6zghO2Vxppfhs0nWRm2NUWd-M60yQiuuPn3LwlZ3TmEFvhqcclm2KKNASKEWRrbcHeQsNuHARc8=w773-h773-s-no-gm" alt="final">
  </div>

  <!-- Play Button -->
  <button id="playButton">▶️ Play</button>

  <!-- Audio -->
  <audio id="backgroundAudio" loop>
    <source src="audio.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <script>
    const audio = document.getElementById("backgroundAudio");
    const playBtn = document.getElementById("playButton");

    // Try to play automatically after animations
    function tryPlayAudio() {
      audio.play().then(() => {
        console.log("Audio playing successfully");
        playBtn.style.display = "none";
      }).catch(err => {
        console.log("Autoplay blocked:", err);
        playBtn.style.display = "block"; // Show button if autoplay fails
      });
    }

    window.addEventListener('load', () => {
      setTimeout(() => {
        // Title fade out
        document.getElementById("title").style.opacity = "0";

        setTimeout(() => {
          document.getElementById("title").style.display = "none";

          // Show overlays
          document.querySelectorAll('.overlay-gif').forEach(overlay => {
            overlay.style.opacity = '1';
          });

          // Bring title back
          setTimeout(() => {
            const title = document.getElementById("title");
            title.style.display = "flex";
            title.style.opacity = "1";
            title.style.position = "relative";
            title.style.top = "10px";
            title.style.left = "auto";
            title.style.transform = "none";
          }, 1000);

          // Try to play audio
          tryPlayAudio();

        }, 1500);
      }, 1000);
    });

    // When user clicks the play button
    playBtn.addEventListener('click', () => {
      audio.play().then(() => {
        playBtn.style.display = "none";
      }).catch(err => {
        console.error("Play failed:", err);
      });
    });
  </script>

</body>
</html>
